; =============================================================================
; Кастомні налаштування PHP — розробка WordPress
; =============================================================================

; --- Пам'ять та виконання ---
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

; --- Завантаження файлів ---
upload_max_filesize = 128M
post_max_size = 128M
max_file_uploads = 20

; --- Помилки (development) ---
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On
error_log = /var/www/html/wp-content/debug.log

; --- OPcache (вимкнено для розробки) ---
opcache.enable = 0
opcache.enable_cli = 0

; --- Часовий пояс ---
date.timezone = Europe/Kyiv

; --- Безпека (development) ---
expose_php = Off
session.cookie_httponly = 1
session.cookie_samesite = Lax

; --- Локаль ---
intl.default_locale = uk_UA
